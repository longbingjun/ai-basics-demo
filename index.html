<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 基础知识入门</title>
  <style>
    :root {
      --bg: #f0f4fc;
      --ink: #0f172a;
      --muted: #5c6b82;
      --line: #d8e2f0;
      --paper: #ffffff;
      --blue: #2563eb;
      --blue-soft: #eff6ff;
      --blue-deep: #1e40af;
      --green: #059669;
      --green-soft: #ecfdf5;
      --amber: #d97706;
      --amber-soft: #fffbeb;
      --violet: #7c3aed;
      --violet-soft: #f5f3ff;
      --shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      --radius: 20px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
      background: radial-gradient(circle at 10% 0%, rgba(37, 99, 235, 0.12), transparent 45%),
                  radial-gradient(circle at 90% 10%, rgba(5, 150, 105, 0.08), transparent 40%),
                  var(--bg);
    }

    .app {
      min-height: 100vh;
      padding: 24px 28px 32px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      flex-wrap: wrap;
    }

    .eyebrow { margin: 0 0 6px; color: var(--blue); font-size: 13px; font-weight: 800; letter-spacing: 0.02em; }
    h1 { margin: 0; font-size: 30px; font-weight: 800; letter-spacing: -0.02em; }
    .lead { margin: 8px 0 0; color: var(--muted); font-size: 15px; max-width: 560px; line-height: 1.6; }

    .controls { display: flex; gap: 8px; flex-wrap: wrap; }

    a.link-btn, button {
      height: 42px;
      padding: 0 16px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--paper);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.06);
      text-decoration: none;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
    }

    button.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    main {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 18px;
      align-items: stretch;
    }

    .sidebar {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 6px;
      align-content: start;
    }

    .part-label {
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 8px 10px 4px;
    }

    .nav-item {
      width: 100%;
      border: none;
      background: transparent;
      text-align: left;
      padding: 10px 12px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.35;
    }

    .nav-item.active { background: var(--blue-soft); color: var(--blue-deep); }
    .nav-item .sub { display: block; font-size: 11px; font-weight: 500; color: var(--muted); margin-top: 2px; }

    .slide {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px 32px;
      min-height: 580px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 20px;
    }

    .slide-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--bg);
    }

    .part-tag {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .part-tag.p1 { background: var(--blue-soft); color: var(--blue-deep); }
    .part-tag.p2 { background: var(--violet-soft); color: var(--violet); }
    .part-tag.p3 { background: var(--green-soft); color: var(--green); }

    .slide h2 { margin: 0; font-size: 26px; font-weight: 800; letter-spacing: -0.02em; }
    .slide-desc { margin: 8px 0 0; color: var(--muted); font-size: 15px; line-height: 1.55; max-width: 640px; }

    .progress {
      width: 72px; height: 72px; border-radius: 50%; flex-shrink: 0;
      display: grid; place-items: center;
      background: conic-gradient(var(--blue) var(--p), #e2e8f0 0);
      position: relative;
    }

    .progress::after { content: ""; position: absolute; inset: 7px; border-radius: 50%; background: #fff; }
    .progress span { position: relative; z-index: 1; font-weight: 800; font-size: 13px; }

    .content { display: grid; align-content: start; gap: 16px; }

    .big-idea {
      margin: 0;
      padding: 18px 22px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--blue-soft), #fff);
      border: 1px solid rgba(37, 99, 235, 0.15);
      font-size: 18px;
      font-weight: 800;
      line-height: 1.55;
      color: var(--blue-deep);
    }

    .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .card-grid.two { grid-template-columns: 1fr 1fr; }

    .card {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px 18px;
      background: #fafbff;
    }

    .card h3 { margin: 0 0 8px; font-size: 16px; font-weight: 800; }
    .card p { margin: 0; font-size: 14px; line-height: 1.65; color: var(--muted); }
    .card.accent-blue { border-color: rgba(37,99,235,.25); background: var(--blue-soft); }
    .card.accent-blue h3 { color: var(--blue-deep); }
    .card.accent-green { border-color: rgba(5,150,105,.25); background: var(--green-soft); }
    .card.accent-green h3 { color: #047857; }
    .card.accent-violet { border-color: rgba(124,58,237,.25); background: var(--violet-soft); }
    .card.accent-violet h3 { color: var(--violet); }

    .pipeline {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      position: relative;
    }

    .pipe-step {
      border-radius: 16px;
      padding: 16px;
      border: 2px solid var(--line);
      background: #fff;
      position: relative;
    }

    .pipe-step:not(:last-child)::after {
      content: "→";
      position: absolute;
      right: -14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-weight: 800;
      z-index: 1;
    }

    .pipe-step h4 { margin: 0 0 6px; font-size: 15px; font-weight: 800; }
    .pipe-step .essence { margin: 0 0 8px; font-size: 13px; font-weight: 700; color: var(--blue); }
    .pipe-step p { margin: 0; font-size: 13px; line-height: 1.6; color: var(--muted); }

    .pipe-step.sft { border-color: rgba(37,99,235,.35); }
    .pipe-step.rlhf { border-color: rgba(124,58,237,.35); }

    .vs-row {
      display: grid;
      grid-template-columns: 100px 1fr 1fr;
      gap: 8px;
      font-size: 13px;
      align-items: start;
    }

    .vs-row.head { font-weight: 800; color: var(--ink); margin-bottom: 4px; }
    .vs-row span { padding: 10px 12px; border-radius: 10px; background: var(--bg); line-height: 1.5; color: var(--muted); }
    .vs-row.head span { background: transparent; padding: 0; }

    .sample-box {
      border-radius: 16px;
      padding: 18px 20px;
      background: var(--blue-soft);
      border: 1px solid rgba(37,99,235,.2);
    }

    .sample-box .label { font-size: 12px; font-weight: 800; color: var(--blue); margin-bottom: 6px; }
    .sample-box .text { font-size: 17px; font-weight: 700; line-height: 1.5; }
    .sample-box .result {
      display: inline-block; margin-top: 12px; padding: 8px 14px;
      background: var(--green-soft); color: #047857; border-radius: 10px; font-weight: 800;
    }

    .steps-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }

    .step-card {
      text-align: center;
      padding: 14px 10px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
    }

    .step-card .num {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--blue); color: #fff;
      display: grid; place-items: center;
      font-size: 13px; font-weight: 800;
      margin: 0 auto 8px;
    }

    .step-card p { margin: 0; font-size: 12px; line-height: 1.45; color: var(--muted); }

    .hero-img-wrap {
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: #fff;
      line-height: 0;
    }

    .hero-img-wrap img { width: 100%; height: auto; display: block; }

    .boundary {
      margin: 0;
      padding: 16px 18px;
      border-radius: 14px;
      background: var(--amber-soft);
      border-left: 4px solid var(--amber);
      font-size: 14px;
      line-height: 1.65;
      color: #78350f;
    }

    .boundary strong { color: var(--amber); }

    .table-simple {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .table-simple th, .table-simple td {
      border: 1px solid var(--line);
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
      line-height: 1.5;
    }

    .table-simple th { background: var(--bg); font-weight: 800; width: 22%; }
    .table-simple td { color: var(--muted); }

    .flow-mini {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 13px;
      font-weight: 700;
    }

    .flow-mini span {
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--green-soft);
      color: #047857;
    }

    .flow-mini .arrow { color: var(--muted); font-weight: 400; }

    .cta-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 20px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--green-soft), #fff);
      border: 1px solid rgba(5,150,105,.25);
    }

    .cta-box p { margin: 0; font-size: 14px; color: var(--muted); line-height: 1.55; }
    .cta-box a {
      flex-shrink: 0;
      padding: 10px 18px;
      background: var(--green);
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }

    .hidden { display: none; }

    @media (max-width: 960px) {
      main { grid-template-columns: 1fr; }
      .sidebar { grid-template-columns: repeat(3, 1fr); display: grid; }
      .part-label { grid-column: 1 / -1; }
      .card-grid, .pipeline, .steps-row { grid-template-columns: 1fr; }
      .pipe-step:not(:last-child)::after { display: none; }
      .vs-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <p class="eyebrow">How to Use AI · 培训材料</p>
        <h1>AI 基础知识入门</h1>
        <p class="lead">先弄懂「答案怎么来的」→ 再分清助手 / Agent / Workflow / Skill → 最后看韶音品号怎么落地。</p>
      </div>
      <div class="controls">
        <a class="link-btn" href="case-study.html">Case Study →</a>
        <button id="prevBtn">上一页</button>
        <button id="nextBtn" class="primary">下一页</button>
      </div>
    </header>

    <main>
      <nav id="nav" class="sidebar"></nav>

      <section class="slide">
        <div class="slide-head">
          <div>
            <span id="partTag" class="part-tag p1"></span>
            <h2 id="slideTitle"></h2>
            <p id="slideDesc" class="slide-desc"></p>
          </div>
          <div id="progress" class="progress"><span id="progressText"></span></div>
        </div>
        <div id="content" class="content"></div>
      </section>
    </main>
  </div>

  <script>
    const slides = [
      {
        part: 1, partName: "大模型底座", tagClass: "p1",
        nav: "本质", sub: "next token",
        title: "大模型的核心本质",
        desc: "一切回答的底层机制——先建立这个直觉。",
        html: `
          <p class="big-idea">现在常用的大模型，本质上就是在<strong>预测下一个 token</strong>——一个字/词片段接一个猜，直到整段话说完。</p>
          <div class="card-grid two">
            <div class="card accent-blue">
              <h3>它是什么</h3>
              <p>读懂你输入的文字，再<strong>生成</strong>一段文字。不是搜索引擎，不是精确计算器。</p>
            </div>
            <div class="card">
              <h3>这意味着什么</h3>
              <p>输出是「统计上最像合理回答的续写」，不是从数据库里查出唯一标准答案。</p>
            </div>
          </div>
        `
      },
      {
        part: 1, partName: "大模型底座", tagClass: "p1",
        nav: "三个概念", sub: "Prompt 等",
        title: "Prompt · 上下文 · Token",
        desc: "搞懂这三样，就搞懂「你给了什么、它能看到什么、它怎么读文字」。",
        html: `
          <div class="card-grid">
            <div class="card accent-blue">
              <h3>Prompt（任务说明）</h3>
              <p>你发给模型的一整段要求：做什么、怎么做、不要做什么。越清楚，续写越不跑偏。</p>
            </div>
            <div class="card accent-green">
              <h3>上下文</h3>
              <p>这一轮它能看到的全部内容 = 你的 Prompt + 历史对话 + 系统设定。太长时，<strong>最早的内容会被挤掉</strong>。</p>
            </div>
            <div class="card accent-violet">
              <h3>Token</h3>
              <p>文字会先被切成模型内部的最小单位再处理。中文「我想要学习英语」可能切成：我 / 想要 / 学习 / 英语。</p>
            </div>
          </div>
          <div class="card" style="margin-top:4px">
            <h3>和「答案从哪来」的关系</h3>
            <p>同一问题，Prompt 不同、上下文不同 → 猜的下一个 token 就不同 → <strong>你看到的答案就不同</strong>。</p>
          </div>
        `
      },
      {
        part: 1, partName: "大模型底座", tagClass: "p1",
        nav: "预训练·SFT·RLHF", sub: "能力从哪来",
        title: "预训练 → 指令微调（SFT）→ RLHF",
        desc: "模型为什么能听懂中文、能按你要求翻译——训练分三阶段，目标各不相同。",
        html: `
          <div class="pipeline">
            <div class="pipe-step">
              <h4>① 预训练</h4>
              <p class="essence">学「语言本身」</p>
              <p>海量文本上练习猜下一个 token，学会语法、常识、中英文对应等<strong>统计规律</strong>。还不会好好听指令。</p>
            </div>
            <div class="pipe-step sft">
              <h4>② 指令微调 SFT</h4>
              <p class="essence">学「按指令说话的格式」</p>
              <p>给大量「用户指令 → 示范回答」配对，让模型<strong>模仿</strong>人类示范：见到「请翻译、不要加意思」就知道该输出哪种格式的译文。</p>
            </div>
            <div class="pipe-step rlhf">
              <h4>③ RLHF</h4>
              <p class="essence">学「哪种回答更像人想要的」</p>
              <p>人对多个候选回答<strong>排序/打分</strong>，模型学习偏好：更清晰、更听话、更安全——而不只是「像训练集里某一条示范」。 </p>
            </div>
          </div>
          <div class="card" style="margin-top:8px">
            <h3>SFT 和 RLHF 的本质区别（一句话）</h3>
            <p style="color:var(--muted);line-height:1.65;margin:0;font-size:14px">
              <strong style="color:var(--blue-deep)">SFT</strong> = 照着<strong>标准答案示范</strong>学怎么做题（模仿）。<br>
              <strong style="color:var(--violet)">RLHF</strong> = 在多种都「说得通」的答案里，学<strong>人更偏好哪一种</strong>（对齐偏好）。<br>
              推理时两者都已融入模型参数——你每次提问，仍然是在做 next token 预测。
            </p>
          </div>
          <div class="vs-row head" style="margin-top:12px"><span></span><span>SFT</span><span>RLHF</span></div>
          <div class="vs-row"><span>学什么</span><span>指令长什么样、回答格式对不对</span><span>哪种说法更 helpful / 更安全</span></div>
          <div class="vs-row"><span>怎么学</span><span>人工写的「问→答」示范，监督学习</span><span>人工比较多个答案好坏，强化学习</span></div>
          <div class="vs-row"><span>翻译例子</span><span>学会：要求翻译时只输出英文、不添字</span><span>多种译法都正确时，倾向更自然、更简洁的那句</span></div>
        `
      },
      {
        part: 1, partName: "大模型底座", tagClass: "p1",
        nav: "翻译串讲", sub: "一轮完整过程",
        title: "翻译例子：从输入到输出",
        desc: "把本质、概念、训练阶段，串成你亲手提问时发生的一轮过程。",
        html: `
          <div class="sample-box">
            <div class="label">你的 Prompt</div>
            <div class="text">请把「我想要学习英语」译成自然英文，不要添加额外含义。</div>
            <div class="result">I want to learn English.</div>
          </div>
          <div class="steps-row">
            <div class="step-card"><div class="num">1</div><p><strong>读入</strong><br>Prompt 切成 token，和上下文一起进入模型</p></div>
            <div class="step-card"><div class="num">2</div><p><strong>预训练底子</strong><br>知道中英文大致怎么对应</p></div>
            <div class="step-card"><div class="num">3</div><p><strong>SFT 起作用</strong><br>按「只翻译、不发挥」的格式写</p></div>
            <div class="step-card"><div class="num">4</div><p><strong>逐 token 写出</strong><br>I → want → to → learn → English → .</p></div>
          </div>
          <p class="big-idea" style="font-size:16px;background:var(--amber-soft);border-color:rgba(217,119,6,.2);color:#92400e">
            幻觉：模型本职是「猜得像真的」，不是「核实事实」。涉及数字、口径、合规 → <strong>必须人工复核</strong>。
          </p>
        `
      },
      {
        part: 2, partName: "工具谱系", tagClass: "p2",
        nav: "助手 vs Agent", sub: "看图",
        title: "AI 助手 与 Agent",
        desc: "",
        html: `
          <div class="hero-img-wrap">
            <img src="assets/agent-flow.png" alt="Agent 执行过程：意图识别、任务规划、多步执行、反馈迭代">
          </div>
          <p class="boundary">
            <strong>边界：</strong>Agent 本质上仍是 <strong>预测 next token + 调用你授权的工具</strong>。
            它「动手」是靠权限和工具（读文件、跑步骤），<strong>不是真正理解业务</strong>。
            口径、数字、规则未定 — 仍要人来拍板。
          </p>
        `
      },
      {
        part: 2, partName: "工具谱系", tagClass: "p2",
        nav: "Workflow", sub: "固定步骤",
        title: "Workflow 是什么",
        desc: "和 Agent 的关系：步骤固定 vs 现场规划。",
        html: `
          <div class="card-grid two">
            <div class="card accent-violet">
              <h3>Workflow</h3>
              <p>步骤<strong>固定</strong>、顺序<strong>固定</strong>：先做什么、再做什么，每月重复都一样。<br><br>例：拉数 → 清洗 → 对老底稿 → 出表。</p>
            </div>
            <div class="card">
              <h3>和 Agent 的区别</h3>
              <p>Agent 会<strong>根据任务现场规划</strong>步骤；Workflow 是人（或项目）先把路线写死。<br><br>常见用法：<strong>Agent 按 Workflow 跑</strong>，但在某一步里临时问你、改计划。</p>
            </div>
          </div>
        `
      },
      {
        part: 2, partName: "工具谱系", tagClass: "p2",
        nav: "Skill", sub: "规则打包",
        title: "Skill 是什么",
        desc: "不是另一种大模型，而是 Agent 的「岗位手册 + 工具箱」。",
        html: `
          <div class="card accent-blue">
            <h3>Skill 的三件事</h3>
            <p style="font-size:15px;line-height:1.7;color:var(--ink)">
              ① <strong>什么时候该用</strong>（触发描述）<br>

    const nav = document.getElementById("nav");
    const content = document.getElementById("content");
    const partTag = document.getElementById("partTag");
    const slideTitle = document.getElementById("slideTitle");
    const slideDesc = document.getElementById("slideDesc");
    const progress = document.getElementById("progress");
    const progressText = document.getElementById("progressText");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    let active = 0;
    let lastPart = null;

    function buildNav() {
      let html = "";
      slides.forEach((s, i) => {
        if (s.part !== lastPart) {
          html += `<div class="part-label">Part ${s.part} · ${s.partName}</div>`;
          lastPart = s.part;
        }
        html += `<button class="nav-item" data-i="${i}">${s.nav}<span class="sub">${s.sub}</span></button>`;
      });
      nav.innerHTML = html;
      nav.querySelectorAll(".nav-item").forEach(b => {
        b.addEventListener("click", () => setSlide(+b.dataset.i));
      });
    }

    function setSlide(i) {
      active = Math.max(0, Math.min(i, slides.length - 1));
      const s = slides[active];
      partTag.className = `part-tag ${s.tagClass}`;
      partTag.textContent = `Part ${s.part} · ${s.partName}`;
      slideTitle.textContent = s.title;
      slideDesc.textContent = s.desc;
      content.innerHTML = s.html;
      nav.querySelectorAll(".nav-item").forEach((b, j) => b.classList.toggle("active", j === active));
      progressText.textContent = `${active + 1}/${slides.length}`;
      progress.style.setProperty("--p", `${((active + 1) / slides.length) * 100}%`);
      prevBtn.disabled = active === 0;
      nextBtn.disabled = active === slides.length - 1;
    }

    prevBtn.onclick = () => setSlide(active - 1);
    nextBtn.onclick = () => setSlide(active + 1);
    document.onkeydown = e => {
      if (e.key === "ArrowRight") setSlide(active + 1);
      if (e.key === "ArrowLeft") setSlide(active - 1);
    };

    buildNav();
    setSlide(0);
  </script>
