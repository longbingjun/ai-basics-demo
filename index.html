<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 基础知识入门</title>
  <style>
    :root {
      --bg: #eef2f8;
      --ink: #0f172a;
      --muted: #64748b;
      --line: #dce4f0;
      --paper: #ffffff;
      --blue: #2563eb;
      --blue-soft: #eff6ff;
      --blue-deep: #1e40af;
      --green: #059669;
      --green-soft: #ecfdf5;
      --amber: #d97706;
      --amber-soft: #fffbeb;
      --violet: #7c3aed;
      --violet-soft: #f5f3ff;
      --shadow: 0 16px 40px rgba(15, 23, 42, 0.07);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
      background: linear-gradient(160deg, #f8fafc 0%, var(--bg) 50%, #e8eef8 100%);
    }

    .app {
      min-height: 100vh;
      padding: 28px 32px 36px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 24px;
      max-width: 1280px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 20px;
      flex-wrap: wrap;
    }

    .eyebrow { margin: 0 0 6px; color: var(--blue); font-size: 13px; font-weight: 800; }
    h1 { margin: 0; font-size: 32px; font-weight: 800; letter-spacing: -0.02em; }
    .lead { margin: 10px 0 0; color: var(--muted); font-size: 15px; max-width: 540px; line-height: 1.65; }

    .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

    a.link-btn, button {
      height: 40px;
      padding: 0 16px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--paper);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      transition: border-color .15s, box-shadow .15s;
    }

    a.link-btn:hover, button:not(:disabled):hover {
      border-color: #b8c9e4;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.06);
    }

    button.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    main {
      display: grid;
      grid-template-columns: 268px 1fr;
      gap: 22px;
      align-items: stretch;
      min-height: 0;
    }

    /* ── 左侧：学习路径时间线 ── */
    .part-rail {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px 18px 20px;
      display: flex;
      flex-direction: column;
      align-self: start;
      position: sticky;
      top: 24px;
    }

    .rail-title {
      margin: 0 0 18px;
      padding: 0 6px 14px;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .part-nav {
      display: flex;
      flex-direction: column;
      gap: 0;
      position: relative;
    }

    .part-btn {
      width: 100%;
      border: none;
      background: transparent;
      border-radius: 14px;
      padding: 12px 10px 12px 8px;
      cursor: pointer;
      text-align: left;
      display: grid;
      grid-template-columns: 44px 1fr;
      gap: 12px;
      align-items: start;
      position: relative;
      transition: background .18s ease;
    }

    .part-btn::before {
      content: "";
      position: absolute;
      left: 29px;
      top: 48px;
      bottom: -12px;
      width: 2px;
      background: var(--line);
      border-radius: 1px;
    }

    .part-btn:last-child::before { display: none; }

    .part-btn:hover { background: #f8fafd; }

    .part-btn.active {
      background: linear-gradient(90deg, rgba(37, 99, 235, 0.07) 0%, transparent 100%);
    }

    .part-btn.active.p2 {
      background: linear-gradient(90deg, rgba(124, 58, 237, 0.07) 0%, transparent 100%);
    }

    .part-btn.active.p3 {
      background: linear-gradient(90deg, rgba(5, 150, 105, 0.08) 0%, transparent 100%);
    }

    .part-btn.active::after {
      content: "";
      position: absolute;
      left: 0;
      top: 10px;
      bottom: 10px;
      width: 3px;
      border-radius: 0 3px 3px 0;
      background: var(--blue);
    }

    .part-btn.active.p2::after { background: var(--violet); }
    .part-btn.active.p3::after { background: var(--green); }

    .step-dot {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 16px;
      font-weight: 800;
      flex-shrink: 0;
      border: 2px solid var(--line);
      background: #fff;
      color: var(--muted);
      transition: all .18s ease;
      position: relative;
      z-index: 1;
    }

    .part-btn.p1 .step-dot { border-color: #bfdbfe; color: var(--blue-deep); }
    .part-btn.p2 .step-dot { border-color: #ddd6fe; color: var(--violet); }
    .part-btn.p3 .step-dot { border-color: #a7f3d0; color: #047857; }

    .part-btn.active.p1 .step-dot {
      background: linear-gradient(145deg, #3b82f6, #1d4ed8);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 6px 16px rgba(37, 99, 235, 0.35);
    }

    .part-btn.active.p2 .step-dot {
      background: linear-gradient(145deg, #8b5cf6, #6d28d9);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 6px 16px rgba(124, 58, 237, 0.35);
    }

    .part-btn.active.p3 .step-dot {
      background: linear-gradient(145deg, #10b981, #047857);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 6px 16px rgba(5, 150, 105, 0.35);
    }

    .part-body { min-width: 0; padding-top: 2px; }

    .part-btn .label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #94a3b8;
      margin-bottom: 3px;
      letter-spacing: 0.02em;
    }

    .part-btn.active .label { color: var(--blue-deep); }
    .part-btn.active.p2 .label { color: var(--violet); }
    .part-btn.active.p3 .label { color: #047857; }

    .part-btn .name {
      display: block;
      font-size: 16px;
      font-weight: 800;
      line-height: 1.35;
      color: var(--ink);
      margin-bottom: 4px;
    }

    .part-btn .hint {
      display: block;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
      margin-bottom: 8px;
    }

    .part-meta {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .part-count {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      background: var(--bg);
      padding: 2px 8px;
      border-radius: 999px;
    }

    .part-progress {
      flex: 1;
      height: 4px;
      background: #e8eef6;
      border-radius: 999px;
      overflow: hidden;
    }

    .part-progress span {
      display: block;
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: var(--blue);
      transition: width .25s ease;
    }

    .part-btn.p2 .part-progress span { background: var(--violet); }
    .part-btn.p3 .part-progress span { background: var(--green); }

    /* ── 右侧：Tab + 内容 ── */
    .panel {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: auto auto 1fr;
      min-height: 620px;
      overflow: hidden;
    }

    .panel-head {
      padding: 22px 28px 0;
      border-bottom: 1px solid var(--bg);
    }

    .part-tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .part-tag.p1 { background: var(--blue-soft); color: var(--blue-deep); }
    .part-tag.p2 { background: var(--violet-soft); color: var(--violet); }
    .part-tag.p3 { background: var(--green-soft); color: #047857; }

    .panel-head h2 { margin: 0; font-size: 24px; font-weight: 800; letter-spacing: -0.02em; }
    .panel-desc { margin: 8px 0 0; color: var(--muted); font-size: 14px; line-height: 1.55; }

    .tab-bar {
      display: flex;
      gap: 6px;
      padding: 14px 28px;
      border-bottom: 1px solid var(--line);
      background: #fafbfd;
      overflow-x: auto;
      flex-wrap: wrap;
    }

    .tab {
      border: 1px solid transparent;
      background: transparent;
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: background .12s, color .12s, border-color .12s;
    }

    .tab:hover { background: #fff; color: var(--ink); border-color: var(--line); }

    .tab.active {
      background: #fff;
      color: var(--blue-deep);
      border-color: rgba(37, 99, 235, 0.35);
      box-shadow: 0 2px 8px rgba(37, 99, 235, 0.08);
    }

    .panel.p2-active .tab.active { color: var(--violet); border-color: rgba(124, 58, 237, 0.35); box-shadow: 0 2px 8px rgba(124, 58, 237, 0.08); }
    .panel.p3-active .tab.active { color: #047857; border-color: rgba(5, 150, 105, 0.35); box-shadow: 0 2px 8px rgba(5, 150, 105, 0.08); }

    .content {
      padding: 24px 28px 28px;
      overflow-y: auto;
      display: grid;
      align-content: start;
      gap: 16px;
    }

    .big-idea {
      margin: 0;
      padding: 18px 22px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--blue-soft), #fff);
      border: 1px solid rgba(37, 99, 235, 0.15);
      font-size: 17px;
      font-weight: 800;
      line-height: 1.55;
      color: var(--blue-deep);
    }

    .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .card-grid.two { grid-template-columns: 1fr 1fr; }

    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px 18px;
      background: #fafbff;
    }

    .card h3 { margin: 0 0 8px; font-size: 15px; font-weight: 800; }
    .card p { margin: 0; font-size: 14px; line-height: 1.65; color: var(--muted); }
    .card.accent-blue { border-color: rgba(37,99,235,.25); background: var(--blue-soft); }
    .card.accent-blue h3 { color: var(--blue-deep); }
    .card.accent-green { border-color: rgba(5,150,105,.25); background: var(--green-soft); }
    .card.accent-green h3 { color: #047857; }
    .card.accent-violet { border-color: rgba(124,58,237,.25); background: var(--violet-soft); }
    .card.accent-violet h3 { color: var(--violet); }

    .pipeline {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .pipe-step {
      border-radius: 14px;
      padding: 16px;
      border: 2px solid var(--line);
      background: #fff;
      position: relative;
    }

    .pipe-step:not(:last-child)::after {
      content: "→";
      position: absolute;
      right: -14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-weight: 800;
      z-index: 1;
    }

    .pipe-step h4 { margin: 0 0 6px; font-size: 15px; font-weight: 800; }
    .pipe-step .essence { margin: 0 0 8px; font-size: 13px; font-weight: 700; color: var(--blue); }
    .pipe-step p { margin: 0; font-size: 13px; line-height: 1.6; color: var(--muted); }
    .pipe-step.sft { border-color: rgba(37,99,235,.35); }
    .pipe-step.rlhf { border-color: rgba(124,58,237,.35); }

    .vs-row {
      display: grid;
      grid-template-columns: 100px 1fr 1fr;
      gap: 8px;
      font-size: 13px;
      align-items: start;
    }

    .vs-row.head { font-weight: 800; color: var(--ink); margin-bottom: 4px; }
    .vs-row span { padding: 10px 12px; border-radius: 10px; background: var(--bg); line-height: 1.5; color: var(--muted); }
    .vs-row.head span { background: transparent; padding: 0; }

    .sample-box {
      border-radius: 14px;
      padding: 18px 20px;
      background: var(--blue-soft);
      border: 1px solid rgba(37,99,235,.2);
    }

    .sample-box .label { font-size: 12px; font-weight: 800; color: var(--blue); margin-bottom: 6px; }
    .sample-box .text { font-size: 17px; font-weight: 700; line-height: 1.5; }
    .sample-box .result {
      display: inline-block; margin-top: 12px; padding: 8px 14px;
      background: var(--green-soft); color: #047857; border-radius: 10px; font-weight: 800;
    }

    .steps-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }

    .step-card {
      text-align: center;
      padding: 14px 10px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
    }

    .step-card .num {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--blue); color: #fff;
      display: grid; place-items: center;
      font-size: 13px; font-weight: 800;
      margin: 0 auto 8px;
    }

    .step-card p { margin: 0; font-size: 12px; line-height: 1.45; color: var(--muted); }

    .hero-img-wrap {
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: #fff;
      line-height: 0;
    }

    .hero-img-wrap img { width: 100%; height: auto; display: block; }

    .boundary {
      margin: 0;
      padding: 16px 18px;
      border-radius: 12px;
      background: var(--amber-soft);
      border-left: 4px solid var(--amber);
      font-size: 14px;
      line-height: 1.65;
      color: #78350f;
    }

    .boundary strong { color: var(--amber); }

    .table-simple {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .table-simple th, .table-simple td {
      border: 1px solid var(--line);
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
      line-height: 1.5;
    }

    .table-simple th { background: var(--bg); font-weight: 800; width: 22%; }
    .table-simple td { color: var(--muted); }

    .flow-mini {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 13px;
      font-weight: 700;
    }

    .flow-mini span {
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--green-soft);
      color: #047857;
    }

    .flow-mini .arrow { color: var(--muted); font-weight: 400; }

    .token-demo {
      border-radius: 14px;
      border: 1px solid var(--line);
      padding: 16px 18px;
      background: #fff;
    }

    .token-demo .sentence {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .token-demo .caption {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .token-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .token-chip {
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      background: var(--violet-soft);
      color: var(--violet);
      border: 1px solid rgba(124, 58, 237, 0.2);
    }

    .token-chip.split {
      background: var(--blue-soft);
      color: var(--blue-deep);
      border-color: rgba(37, 99, 235, 0.2);
    }

    .token-arrow { color: #cbd5e1; font-weight: 400; font-size: 12px; }

    .phase-block {
      border-radius: 14px;
      border: 1px solid var(--line);
      overflow: hidden;
    }

    .phase-head {
      padding: 10px 16px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .phase-head.train { background: #f1f5f9; color: #475569; }
    .phase-head.infer { background: var(--blue-soft); color: var(--blue-deep); }

    .phase-body { padding: 14px 16px; background: #fff; }

    .chain-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 10px;
    }

    .chain-list li {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 12px;
      align-items: start;
      font-size: 14px;
      line-height: 1.55;
      color: var(--muted);
    }

    .chain-list .n {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--blue);
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      display: grid;
      place-items: center;
    }

    .chain-list strong { color: var(--ink); }

    .qa-block {
      border-radius: 14px;
      padding: 16px 18px;
      border: 1px solid var(--line);
      background: #fafbff;
    }

    .qa-block h3 {
      margin: 0 0 10px;
      font-size: 15px;
      font-weight: 800;
      color: var(--blue-deep);
    }

    .qa-block p { margin: 0; font-size: 14px; line-height: 1.65; color: var(--muted); }

    .gen-loop {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      padding: 14px 16px;
      border-radius: 12px;
      background: var(--bg);
      font-size: 14px;
      font-weight: 700;
    }

    .gen-loop .tok {
      padding: 5px 10px;
      border-radius: 8px;
      background: #fff;
      border: 1px solid var(--line);
    }

    .gen-loop .tok.new {
      background: var(--green-soft);
      border-color: rgba(5, 150, 105, 0.3);
      color: #047857;
    }

    .gen-loop .dots { color: var(--muted); font-weight: 400; }

    .cta-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 20px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--green-soft), #fff);
      border: 1px solid rgba(5,150,105,.25);
    }

    .cta-box p { margin: 0; font-size: 14px; color: var(--muted); line-height: 1.55; }
    .cta-box a {
      flex-shrink: 0;
      padding: 10px 18px;
      background: var(--green);
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }

    @media (max-width: 960px) {
      main { grid-template-columns: 1fr; }
      .part-rail { position: static; }
      .part-nav { flex-direction: column; }
      .part-btn::before { display: none; }
      .card-grid, .pipeline, .steps-row { grid-template-columns: 1fr; }
      .pipe-step:not(:last-child)::after { display: none; }
      .vs-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <p class="eyebrow">How to Use AI · 培训材料</p>
        <h1>AI 基础知识入门</h1>
        <p class="lead">先弄懂「答案怎么来的」→ 再分清助手 / Agent / Workflow / Skill → 最后看韶音品号怎么落地。</p>
      </div>
      <div class="controls">
        <a class="link-btn" href="case-study.html">Case Study →</a>
        <button id="prevBtn">← 上一页</button>
        <button id="nextBtn" class="primary">下一页 →</button>
      </div>
    </header>

    <main>
      <aside class="part-rail">
        <p class="rail-title">学习路径</p>
        <nav id="partNav" class="part-nav"></nav>
      </aside>

      <div id="panel" class="panel">
        <div class="panel-head">
          <span id="partTag" class="part-tag p1"></span>
          <h2 id="slideTitle"></h2>
          <p id="slideDesc" class="panel-desc"></p>
        </div>
        <div id="tabBar" class="tab-bar"></div>
        <div id="content" class="content"></div>
      </div>
    </main>
  </div>

  <script>
    const parts = [
      {
        id: 1, name: "大模型底座", tagClass: "p1", btnClass: "p1",
        hint: "弄懂答案怎么来",
        slides: [
          {
            tab: "Token",
            title: "Token 是什么？",
            desc: "在讲「预测 next token」之前，先搞懂模型实际在读什么。",
            html: `
              <p class="big-idea">Token 不是「一个字」或「一个英文单词」那么简单——它是模型把文字<strong>切分后、内部处理的最小单位</strong>。模型不直接读汉字或字母，读的是一串 token。</p>
              <div class="card-grid two">
                <div class="token-demo">
                  <div class="caption">中文例子</div>
                  <div class="sentence">「我想要学习英语」</div>
                  <div class="token-chips">
                    <span class="token-chip">我</span><span class="token-arrow">→</span>
                    <span class="token-chip">想要</span><span class="token-arrow">→</span>
                    <span class="token-chip">学习</span><span class="token-arrow">→</span>
                    <span class="token-chip">英语</span>
                  </div>
                  <p style="margin:10px 0 0;font-size:13px;color:var(--muted);line-height:1.5">中文常按词或常见组合切，不一定一字一个 token。</p>
                </div>
                <div class="token-demo">
                  <div class="caption">英文例子</div>
                  <div class="sentence">"I want to learn English"</div>
                  <div class="token-chips">

    let partIdx = 0;

    const partNav = document.getElementById("partNav");
    const panel = document.getElementById("panel");
    const tabBar = document.getElementById("tabBar");
    const content = document.getElementById("content");
    const partTag = document.getElementById("partTag");
    const slideTitle = document.getElementById("slideTitle");
    const slideDesc = document.getElementById("slideDesc");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    function flatIndex(p, t) {
      let idx = 0;
      for (let i = 0; i < p; i++) idx += parts[i].slides.length;
      return idx + t;
    }

    function totalSlides() {
      return parts.reduce((n, p) => n + p.slides.length, 0);
    }

    function buildPartNav() {
      partNav.innerHTML = parts.map((p, i) => `
        <button class="part-btn ${p.btnClass}" data-part="${i}">
          <span class="step-dot">${p.id}</span>
          <span class="part-body">
            <span class="label">Part ${p.id}</span>
            <span class="name">${p.name}</span>
            <span class="hint">${p.hint}</span>
            <span class="part-meta">
              <span class="part-count">${p.slides.length} 节</span>
              <span class="part-progress"><span data-progress="${i}"></span></span>
            </span>
          </span>
        </button>
      `).join("");
      partNav.querySelectorAll(".part-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          setView(+btn.dataset.part, 0);
        });
      });
    }

    function updatePartProgress() {
      parts.forEach((p, i) => {
        const bar = partNav.querySelector(`[data-progress="${i}"]`);
        if (!bar) return;
        const pct = i < partIdx ? 100
          : i === partIdx ? ((tabIdx + 1) / p.slides.length) * 100
          : 0;
        bar.style.width = `${pct}%`;
      });
    }

    function buildTabs() {
      const part = parts[partIdx];
      tabBar.innerHTML = part.slides.map((s, i) => `
        <button class="tab" data-tab="${i}">${s.tab}</button>
      `).join("");
      tabBar.querySelectorAll(".tab").forEach(btn => {
        btn.addEventListener("click", () => setView(partIdx, +btn.dataset.tab));
      });
    }

    function setView(p, t) {
      partIdx = p;
      tabIdx = t;
      const part = parts[partIdx];
      const slide = part.slides[tabIdx];

      partNav.querySelectorAll(".part-btn").forEach((btn, i) => {
        btn.classList.toggle("active", i === partIdx);
      });

      panel.className = "panel";
      if (partIdx === 1) panel.classList.add("p2-active");
      if (partIdx === 2) panel.classList.add("p3-active");

      buildTabs();
      tabBar.querySelectorAll(".tab").forEach((btn, i) => {
        btn.classList.toggle("active", i === tabIdx);
      });

      partTag.className = `part-tag ${part.tagClass}`;
      partTag.textContent = `Part ${part.id} · ${part.name}`;
      slideTitle.textContent = slide.title;
      slideDesc.textContent = slide.desc;
      slideDesc.style.display = slide.desc ? "block" : "none";
      content.innerHTML = slide.html;

      const globalIdx = flatIndex(partIdx, tabIdx);
      prevBtn.disabled = globalIdx === 0;
      nextBtn.disabled = globalIdx === totalSlides() - 1;
      updatePartProgress();
    }

    prevBtn.onclick = () => {
      const g = flatIndex(partIdx, tabIdx);
      if (g <= 0) return;
      if (tabIdx > 0) setView(partIdx, tabIdx - 1);
      else setView(partIdx - 1, parts[partIdx - 1].slides.length - 1);
    };

    nextBtn.onclick = () => {
      const g = flatIndex(partIdx, tabIdx);
      if (g >= totalSlides() - 1) return;
      if (tabIdx < parts[partIdx].slides.length - 1) setView(partIdx, tabIdx + 1);
      else setView(partIdx + 1, 0);
    };

    document.onkeydown = e => {
      if (e.key === "ArrowRight") nextBtn.click();
      if (e.key === "ArrowLeft") prevBtn.click();
    };

    buildPartNav();
    setView(0, 0);
  </script>
</body>
</html>
